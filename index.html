<input id="amount" placeholder="Enter amount" />

<button onclick="sendSplitTransaction()">
  Send 70%
</button>

<!-- ✅ REQUIRED -->
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<script>
async function sendSplitTransaction() {
  const provider = window.solana;

  if (!provider || !provider.isPhantom) {
    alert("Phantom not found");
    return;
  }

  await provider.connect();

  const amount = parseFloat(document.getElementById("amount").value);

  if (!amount || amount <= 0) {
    alert("Invalid amount");
    return;
  }

  const sender = provider.publicKey.toString();

  const res = await fetch("https://frosty-meadow-f942-claim-worker.msummit2026.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sender,
      mint: "A3vBwL3Pd6nkBqVo87D6TLWYG4ekWuDeqCoLFeyvRMcb",
      amount: amount
    }),
  });

  if (!res.ok) {
    const text = await res.text();
    console.error("Worker error:", text);
    alert("Worker failed");
    return;
  }

  const { tx } = await res.json();

  const transaction = solanaWeb3.Transaction.from(
    Uint8Array.from(atob(tx), c => c.charCodeAt(0))
  );

  const signed = await provider.signTransaction(transaction);

  const signature = await provider.request({
    method: "sendRawTransaction",
    params: [signed.serialize().toString("base64")],
  });

  console.log("TX Sent:", signature);
}
</script>
