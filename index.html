<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSummit Token Claim</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        h1 {
            background: linear-gradient(68deg, #eb00ff 3.6%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            text-align: center;
        }
        .card {
            background: #1d263b;
            border: 1px solid #27253e;
            border-radius: 15px;
            padding: 25px 30px;
            max-width: 480px;
            width: 100%;
        }
        h3 {
            background: linear-gradient(68deg, #eb00ff 3.6%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .btn {
            background: linear-gradient(68deg, #eb00ff 3.6%, #00f0ff 100%);
            border: none;
            color: white;
            padding: 13px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 12px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .wallet-btn {
            background: #0d1117;
            border: 1px solid #27253e;
            color: white;
            padding: 11px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            text-align: center;
        }
        .wallet-btn:hover { border-color: #eb00ff; }
        .split-box {
            background: #0d1117;
            border: 1px solid #eb00ff33;
            border-radius: 10px;
            padding: 15px;
            margin: 12px 0;
        }
        .split-row {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            font-size: 13px;
            border-bottom: 1px solid #ffffff11;
        }
        .split-row:last-child { border-bottom: none; }
        .split-label { color: #aaa; }
        .split-value { color: #00f0ff; font-weight: bold; }
        .addr {
            background: #0d1117;
            border: 1px solid #27253e;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            color: #00f0ff;
            word-break: break-all;
            margin-top: 8px;
        }
        .msg {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            line-height: 1.6;
        }
        .msg.error   { background: #ff000022; border: 1px solid #ff0000; color: #ff6666; }
        .msg.success { background: #00ff8822; border: 1px solid #00ff88; color: #00ff88; }
        .msg.info    { background: #0088ff22; border: 1px solid #0088ff; color: #88ccff; }
        .dot { width:8px; height:8px; border-radius:50%; background:#555; display:inline-block; margin-right:6px; }
        .dot.on { background: #00ff88; }
        .loader {
            border: 3px solid #333;
            border-top: 3px solid #eb00ff;
            border-radius: 50%;
            width: 28px; height: 28px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
            display: none;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .step { display: none; }
        .step.active { display: block; }
        .tx-link {
            color: #00f0ff;
            font-size: 11px;
            word-break: break-all;
            text-decoration: underline;
        }
        .agree {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 12px;
            font-size: 13px;
            color: #ccc;
            cursor: pointer;
        }
        .agree input { margin-top: 3px; }
    </style>
</head>
<body>

<h1>🏔️ MSummit Claim</h1>

<div class="card">

    <!-- STEP 1: Fee agreement -->
    <div class="step active" id="step1">
        <h3>📋 Fee Structure</h3>
        <p style="color:#aaa;font-size:13px">Please read and agree before proceeding.</p>

        <div class="split-box">
            <div class="split-row">
                <span class="split-label">You receive</span>
                <span class="split-value">45%</span>
            </div>
            <div class="split-row">
                <span class="split-label">Company wallet receives</span>
                <span class="split-value">45%</span>
            </div>
            <div class="split-row">
                <span class="split-label">Platform fee</span>
                <span class="split-value">10%</span>
            </div>
        </div>

        <label class="agree">
            <input type="checkbox" id="agreeBox" />
            I agree to the 45/45/10 fee structure above
        </label>

        <button class="btn" onclick="goStep(2)">Continue →</button>
        <div class="msg error" id="err1"></div>
    </div>

    <!-- STEP 2: Connect wallet -->
    <div class="step" id="step2">
        <h3>👛 Connect Wallet</h3>
        <p style="font-size:12px;color:#aaa">
            <span class="dot" id="dot"></span>
            <span id="connText">Not connected</span>
        </p>
        <div class="addr" id="connAddr" style="display:none"></div>

        <button class="wallet-btn" onclick="connect('phantom')">👻 Phantom</button>
        <button class="wallet-btn" onclick="connect('solflare')">🔆 Solflare</button>
        <button class="wallet-btn" onclick="connect('backpack')">🎒 Backpack</button>

        <div class="msg error"   id="err2"></div>
        <div class="msg success" id="ok2"></div>

        <button class="btn" style="background:#333;margin-top:15px;font-size:13px" onclick="goStep(1)">← Back</button>
    </div>

    <!-- STEP 3: Preview & Claim -->
    <div class="step" id="step3">
        <h3>💰 Claim Tokens</h3>

        <div class="split-box" id="previewBox" style="display:none">
            <div class="split-row">
                <span class="split-label">Total Balance</span>
                <span class="split-value" id="prvTotal">-</span>
            </div>
            <div class="split-row">
                <span class="split-label">You will receive (45%)</span>
                <span class="split-value" id="prvSigner">-</span>
            </div>
            <div class="split-row">
                <span class="split-label">Company receives (45%)</span>
                <span class="split-value" id="prvCompany">-</span>
            </div>
            <div class="split-row">
                <span class="split-label">Platform fee (10%)</span>
                <span class="split-value" id="prvFee">-</span>
            </div>
        </div>

        <div class="loader" id="loader"></div>

        <button class="btn" id="previewBtn" onclick="loadPreview()">🔍 Check Balance</button>
        <button class="btn" id="claimBtn"   onclick="doClaim()" style="display:none">✅ Confirm & Claim</button>

        <div class="msg error"   id="err3"></div>
        <div class="msg success" id="ok3"></div>
        <div class="msg info"    id="info3"></div>

        <button class="btn" style="background:#333;margin-top:15px;font-size:13px" onclick="goStep(2)">← Back</button>
    </div>

</div>

<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const API = "https://misty-feather-a031rnsummit.msummit2026.workers.dev";
const RPC = "https://api.mainnet-beta.solana.com";
const TOKEN_MINT    = "A3vBwL3Pd6nkBqVo87D6TLWYG4ekWuDeqCoLFeyvRMcb";
const TOKEN_PROGRAM = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA";
const ASSOC_PROGRAM = "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1bZ9";
// ─────────────────────────────────────────

let walletObj  = null;
let walletAddr = null;
let txData     = null;

// ── Navigation ──
function goStep(n) {
    if (n === 2 && !document.getElementById('agreeBox').checked) {
        show('err1','⚠️ Please agree to the fee structure first.');
        return;
    }
    hide('err1');
    [1,2,3].forEach(i => {
        document.getElementById('step'+i).classList.remove('active');
    });
    document.getElementById('step'+n).classList.add('active');

    if (n === 3) loadPreview();
}

// ── Connect wallet ──
async function connect(type) {
    hide('err2'); hide('ok2');
    try {
        let w = null;
        if (type==='phantom')  w = window.solana || window.phantom?.solana;
        if (type==='solflare') w = window.solflare;
        if (type==='backpack') w = window.backpack || window.xnft?.solana;

        if (!w) {
            show('err2', '❌ ' + type + ' wallet not found. Please install it.');
            return;
        }

        await w.connect();
        walletObj  = w;
        walletAddr = w.publicKey.toString();

        document.getElementById('dot').className      = 'dot on';
        document.getElementById('connText').textContent = 'Connected';
        const ad = document.getElementById('connAddr');
        ad.textContent  = walletAddr;
        ad.style.display = 'block';

        show('ok2', '✅ Wallet connected! Proceeding...');
        setTimeout(() => goStep(3), 1000);

    } catch(e) {
        show('err2', e.message?.includes('rejected') ? '⚠️ Cancelled by user.' : '❌ ' + e.message);
    }
}

// ── Load preview from API ──
async function loadPreview() {
    if (!walletAddr) return;
    hide('err3'); hide('ok3'); hide('info3');
    document.getElementById('previewBox').style.display = 'none';
    document.getElementById('claimBtn').style.display   = 'none';
    document.getElementById('previewBtn').style.display = 'none';
    loader(true);

    try {
        const res  = await fetch(API + '/preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ walletAddress: walletAddr })
        });
        const data = await res.json();
        loader(false);

        if (!data.success) {
            show('err3', '❌ ' + data.error);
            document.getElementById('previewBtn').style.display = 'block';
            return;
        }

        document.getElementById('prvTotal').textContent   = data.balance.toFixed(4)  + ' SUMMIT';
        document.getElementById('prvSigner').textContent  = data.signer.toFixed(4)   + ' SUMMIT';
        document.getElementById('prvCompany').textContent = data.company.toFixed(4)  + ' SUMMIT';
        document.getElementById('prvFee').textContent     = data.fee.toFixed(4)      + ' SUMMIT';

        document.getElementById('previewBox').style.display = 'block';
        document.getElementById('claimBtn').style.display   = 'block';
        document.getElementById('previewBtn').style.display = 'block';

    } catch(e) {
        loader(false);
        show('err3', '❌ Failed to load preview: ' + e.message);
        document.getElementById('previewBtn').style.display = 'block';
    }
}

// ── Do Claim ──
async function doClaim() {
    if (!walletAddr || !walletObj) {
        show('err3','❌ Wallet not connected');
        return;
    }

    hide('err3'); hide('ok3'); hide('info3');
    document.getElementById('claimBtn').disabled   = true;
    document.getElementById('previewBtn').disabled = true;
    loader(true);
    show('info3','⏳ Building transaction...');

    try {
        // 1. Get tx data from API
        const res  = await fetch(API + '/build-tx', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ walletAddress: walletAddr })
        });
        const data = await res.json();

        if (!data.success) {
            throw new Error(data.error);
        }

        show('info3','⏳ Building transaction instructions...');

        const { Connection, PublicKey, Transaction, SystemProgram } = solanaWeb3;

        const connection   = new Connection(RPC, 'confirmed');
        const walletPK     = new PublicKey(walletAddr);
        const mintPK       = new PublicKey(TOKEN_MINT);
        const tokenProgPK  = new PublicKey(TOKEN_PROGRAM);
        const assocProgPK  = new PublicKey(ASSOC_PROGRAM);

        const tx = new Transaction();
        tx.recentBlockhash      = data.blockhash;
        tx.lastValidBlockHeight = data.lastValidBlockHeight;
        tx.feePayer             = walletPK;

        const signerATA  = new PublicKey(data.accounts.signerATA);
        const companyATA = new PublicKey(data.accounts.companyATA);
        const feeATA     = new PublicKey(data.accounts.feeATA);
        const companyPK  = new PublicKey(data.accounts.companyWallet);
        const feePK      = new PublicKey(data.accounts.feeWallet);

        // Create ATA if needed
        if (!data.accounts.companyExists) {
            tx.add(createATAInstruction(walletPK, companyATA, companyPK, mintPK, tokenProgPK, assocProgPK));
        }
        if (!data.accounts.feeExists) {
            tx.add(createATAInstruction(walletPK, feeATA, feePK, mintPK, tokenProgPK, assocProgPK));
        }

        // Transfer to company (45%)
        tx.add(createSPLTransferInstruction(
            signerATA, companyATA, walletPK,
            data.amounts.company, tokenProgPK
        ));

        // Transfer to fee wallet (10%)
        tx.add(createSPLTransferInstruction(
            signerATA, feeATA, walletPK,
            data.amounts.fee, tokenProgPK
        ));

        show('info3','⏳ Please approve in your wallet...');

        // Sign and send
        const signed = await walletObj.signTransaction(tx);
        const sig    = await connection.sendRawTransaction(signed.serialize());

        loader(false);
        hide('info3');
        show('ok3',
            '✅ Claim successful!\n' +
            'You received: ' + data.summary.signer.toFixed(4) + ' SUMMIT\n' +
            'TX: ' + sig
        );

        document.getElementById('claimBtn').disabled   = false;
        document.getElementById('previewBtn').disabled = false;

        // Refresh preview
        setTimeout(loadPreview, 3000);

    } catch(e) {
        loader(false);
        hide('info3');
        document.getElementById('claimBtn').disabled   = false;
        document.getElementById('previewBtn').disabled = false;

        if (e.message?.includes('rejected') || e.message?.includes('User rejected')) {
            show('err3','⚠️ Transaction cancelled by user.');
        } else {
            show('err3','❌ Claim failed: ' + e.message);
        }
    }
}

// ── Build create ATA instruction ──
function createATAInstruction(payer, ata, owner, mint, tokenProg, assocProg) {
    const { PublicKey, TransactionInstruction } = solanaWeb3;
    return new TransactionInstruction({
        programId: assocProg,
        keys: [
            { pubkey: payer,    isSigner: true,  isWritable: true  },
            { pubkey: ata,      isSigner: false, isWritable: true  },
            { pubkey: owner,    isSigner: false, isWritable: false },
            { pubkey: mint,     isSigner: false, isWritable: false },
            { pubkey: new PublicKey('11111111111111111111111111111111'), isSigner: false, isWritable: false },
            { pubkey: tokenProg,isSigner: false, isWritable: false },
        ],
        data: Buffer.alloc(0)
    });
}

// ── Build SPL transfer instruction ──
function createSPLTransferInstruction(from, to, authority, amount, tokenProg) {
    const { PublicKey, TransactionInstruction } = solanaWeb3;
    const data = Buffer.alloc(9);
    data.writeUInt8(3, 0); // transfer instruction
    data.writeBigUInt64LE(BigInt(amount), 1);
    return new TransactionInstruction({
        programId: tokenProg,
        keys: [
            { pubkey: from,      isSigner: false, isWritable: true  },
            { pubkey: to,        isSigner: false, isWritable: true  },
            { pubkey: authority, isSigner: true,  isWritable: false },
        ],
        data
    });
}

// ── UI helpers ──
function show(id, msg) {
    const el = document.getElementById(id);
    el.textContent    = msg;
    el.style.display  = 'block';
    el.style.whiteSpace = 'pre-line';
}
function hide(id) {
    document.getElementById(id).style.display = 'none';
}
function loader(show) {
    document.getElementById('loader').style.display = show ? 'block' : 'none';
}
</script>

</body>
</html>
