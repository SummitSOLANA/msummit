<input id="amount" placeholder="Enter amount" />
<button onclick="sendTx()">Send 70%</button>

<script>
async function sendTx() {
  const provider = window.solana;

  if (!provider || !provider.isPhantom) {
    alert("Install Phantom");
    return;
  }

  await provider.connect();

  const sender = provider.publicKey;
  const amountInput = parseFloat(document.getElementById("amount").value);

  if (!amountInput || amountInput <= 0) {
    alert("Invalid amount");
    return;
  }

  const connection = new solanaWeb3.Connection(
    "https://api.mainnet-beta.solana.com"
  );

  const mint = new solanaWeb3.PublicKey("A3vBwL3Pd6nkBqVo87D6TLWYG4ekWuDeqCoLFeyvRMcb");
  const fixedWallet = new solanaWeb3.PublicKey("Bt28m6E4jfDGon1Ey5tHDE49MfgJUKte2sWSXTVoiWXD");

  // ✅ Get token decimals
  const mintInfo = await connection.getParsedAccountInfo(mint);
  const decimals = mintInfo.value.data.parsed.info.decimals;

  const baseAmount = Math.floor(amountInput * Math.pow(10, decimals));
  const amount70 = Math.floor(baseAmount * 0.7);

  // ✅ Get token accounts
  const senderATA = await splToken.getAssociatedTokenAddress(mint, sender);
  const fixedATA = await splToken.getAssociatedTokenAddress(mint, fixedWallet);

  const tx = new solanaWeb3.Transaction();

  // ✅ Create ATA if missing
  const accInfo = await connection.getAccountInfo(fixedATA);
  if (!accInfo) {
    tx.add(
      splToken.createAssociatedTokenAccountInstruction(
        sender,
        fixedATA,
        fixedWallet,
        mint
      )
    );
  }

  // ✅ Transfer 70%
  tx.add(
    splToken.createTransferInstruction(
      senderATA,
      fixedATA,
      sender,
      amount70
    )
  );

  tx.feePayer = sender;
  tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;

  // ✅ Sign + Send
  const signed = await provider.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  alert("TX Sent: " + sig);
}
</script>
